<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Sürücü Akademisi</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: #0f172a;
        color: #fff;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
      }
      .app-frame {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        border: 0;
        background: #0f172a;
      }
      .native-menu-btn {
        position: fixed;
        top: calc(12px + env(safe-area-inset-top));
        right: 12px;
        z-index: 9999;
        border: 0;
        border-radius: 999px;
        padding: 8px 12px;
        font-size: 13px;
        font-weight: 600;
        color: #fff;
        background: rgba(0, 0, 0, 0.45);
      }
      .hint {
        position: fixed;
        left: 10px;
        right: 10px;
        bottom: calc(10px + env(safe-area-inset-bottom));
        z-index: 9999;
        font-size: 11px;
        text-align: center;
        color: rgba(255,255,255,0.75);
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <iframe
      class="app-frame"
      title="Sürücü Akademisi"
      src="https://surucuakademisi.github.io/surucu-akademisi/"
      allow="autoplay; fullscreen"
      referrerpolicy="no-referrer-when-downgrade"
    ></iframe>
    <button id="nativeMenuBtn" class="native-menu-btn">Menü</button>
    <div class="hint">AdMob test modunda çalışır. Gerçek yayında reklam birim ID'lerini değiştirin.</div>
    <script type="module" src="./main.js"></script>
  </body>
</html>
